<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <meta name="theme-color" content="#164f3a">
  <meta name="description" content="试卷题库20题分组闯关，支持客观题判定、主观题自评和错题重做。">
  <title>20题闯关模式 | 在线题库</title>
  <link rel="icon" href="assets/icons/icon.svg" type="image/svg+xml">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="assets/style.css">
  <link rel="stylesheet" href="assets/challenge.css">
</head>
<body class="challenge-page">
  <a class="skip-link" href="#challenge-main">跳到闯关题目</a>
  <header class="challenge-top">
    <a href="index.html">← 返回题库首页</a>
    <strong>20题闯关模式</strong>
  </header>
  <main class="challenge-main" id="challenge-main">
    <section class="challenge-panel">
      <h1 id="title">正在加载题库...</h1>
      <p class="challenge-hint" id="modeHint">先复习本组答案，再作答并重做尚未掌握的题目。</p>
      <div class="challenge-stats" aria-label="闯关进度">
        <div><strong id="groupNo">--</strong><span>当前组</span></div>
        <div><strong id="rangeText">--</strong><span>题号范围</span></div>
        <div><strong id="phaseText">--</strong><span>当前状态</span></div>
        <div><strong id="wrongCount">0</strong><span>待重做错题</span></div>
      </div>
      <div class="challenge-toolbar">
        <button class="button button-primary" id="startBtn" type="button">开始做这20题</button>
        <button class="button button-primary" id="submitBtn" type="button" hidden>提交本组</button>
        <button class="button button-primary" id="submitWrongBtn" type="button" hidden>提交错题</button>
        <button class="button button-primary" id="nextBtn" type="button" hidden>进入下一组20题</button>
        <button class="button button-quiet" id="backStudyBtn" type="button">返回背答案</button>
        <button class="button button-danger" id="resetBtn" type="button">重置闯关进度</button>
      </div>
    </section>
    <section id="passPanel" class="challenge-pass" hidden>
      <h2 id="passTitle">本组已通过</h2>
      <p id="passCopy">这一组题已经全部做对，可以进入下一组。</p>
    </section>
    <section id="questions" aria-live="off"></section>
  </main>
  <script src="assets/practice-utils.js"></script>
  <script src="assets/ui.js"></script>
  <script src="assets/site.js"></script>
  <script src="assets/challenge.js"></script>
</body>
</html>
